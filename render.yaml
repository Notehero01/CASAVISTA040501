databases:
  - name: casavista-db
    databaseName: casavista
    user: casavista
    plan: basic-256mb
    region: frankfurt
    ipAllowList: []

services:
  - type: web
    runtime: docker
    name: casavista
    plan: starter
    region: frankfurt
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    domains:
      - casavista.it
      - www.casavista.it
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: ADMIN_EMAIL
        value: admin@casavista.it
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: CLIENT_ORIGIN
        value: https://casavista.it,https://www.casavista.it
      - key: DATABASE_URL
        fromDatabase:
          name: casavista-db
          property: connectionString
      - key: R2_ENDPOINT
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_PUBLIC_URL
        sync: false
