services:
  - type: web
    runtime: docker
    name: casavista
    plan: free
    region: frankfurt
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    domains:
      - casavista.it
      - www.casavista.it
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: ADMIN_EMAIL
        value: admin@casavista.it
      - key: ADMIN_PASSWORD
        sync: false
      - key: CLIENT_ORIGIN
        value: https://casavista.it,https://www.casavista.it
